<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal - Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/register.css">
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card register-card p-5">

                <div class="text-center mb-4">
                    <i class="fas fa-user-plus register-icon"></i>
                    <h2 class="fw-bold">Create Account</h2>
                    <p class="text-muted">Join EduPortal today!</p>
                </div>

                <form id="registerForm">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Full Name</label>
                        <input type="text" class="form-control input-style" id="name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control input-style" id="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" class="form-control input-style" id="password" minlength="6" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100 btn-style">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>

                </form>

                <div class="text-center mt-3">
                    <a href="login.html">Already have account? Login</a>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="js/register.js"></script>

</body>
</html>
