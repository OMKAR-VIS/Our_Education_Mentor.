<!DOCTYPE html>
<html>
<head>
    <title>Test Series - EduPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="fas fa-graduation-cap"></i> EduPortal</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
                <a class="nav-link active" href="#">Test</a>
                <a class="nav-link" href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3><i class="fas fa-clipboard-list"></i> Maths Mock Test 1</h3>
                        <p>25 Questions | 30 Minutes | 100 Marks</p>
                    </div>
                    <div class="card-body">
                        <div id="quiz">
                            <div class="question mb-4 p-4 border rounded">
                                <h5>1. What is 2 + 2?</h5>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="q1" value="a">
                                    <label>3</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="q1" value="b">
                                    <label>4 ✅</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="q1" value="c">
                                    <label>5</label>
                                </div>
                            </div>
                            <!-- More questions... -->
                        </div>
                        <div class="text-center mt-4">
                            <button class="btn btn-success btn-lg" onclick="submitTest()">
                                <i class="fas fa-paper-plane"></i> Submit Test
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Login check
        if (!JSON.parse(localStorage.getItem('user'))) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        function submitTest() {
            let score = 0;
            if (document.querySelector('input[name="q1"]:checked')?.value === 'b') score++;
            alert(`🎉 Your Score: ${score}/1\n\nFull test system ready!`);
        }
    </script>
</body>
</html>
