<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal - Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">OUR EDUCATION MENTOR</div>

    <div class="menu">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="#">STUDY MATERIAL</a>
        <a href="contact.html">CONTACT</a>
    </div>
</div>

<!-- Login Box -->
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="login-card">

                <div class="text-center mb-4">
                    <i class="fas fa-graduation-cap fa-3x text-primary mb-3"></i>
                    <h2 class="fw-bold">EduPortal</h2>
                    <p class="text-muted">Secure Login Required</p>
                </div>

                <form id="loginForm">

                    <div class="mb-3">
                        <label class="fw-bold">Email / Admin ID</label>
                        <input type="text" class="form-control rounded-pill" id="email" placeholder="Enter Email" required>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Password</label>
                        <input type="password" class="form-control rounded-pill" id="password" required>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Role</label>

                        <div class="d-flex justify-content-between">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="userLogin" name="role" value="user">
                                <label class="form-check-label">Student</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" id="adminLogin" name="role" value="admin">
                                <label class="form-check-label">Admin</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-login w-100 py-3 rounded-pill">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>

                </form>

                <div class="text-center mt-3">
                    <a href="register.html">Create New Account</a>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="js/login.js"></script>

</body>
</html>
