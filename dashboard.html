<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <!-- LOGO + NAME -->
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="image/OUR_EDUCATION_MENTOR'S_png.png" alt="logo" class="logo-img">
            <span class="ms-2 fw-bold">OUR EDUCATION MENTOR</span>
        </a>

        <div class="ms-auto d-flex gap-3">
            <a class="nav-link text-white" href="#videos"><i class="fas fa-video"></i></a>
            <a class="nav-link text-white" href="#pdfs"><i class="fas fa-file-pdf"></i></a>
            <a class="nav-link text-white" href="#tests"><i class="fas fa-clipboard-list"></i></a>
            <a class="nav-link text-white" href="#" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3">
            <div class="card sidebar p-3 sticky-top" style="top:20px;">

                <div class="user-box">
                    <i class="fas fa-user-circle"></i>
                    <h6 id="userName">Student</h6>
                    <small>ID: <span id="userId">---</span></small>
                </div>

                <a href="#videos"><i class="fas fa-play-circle"></i> Videos</a>
                <a href="#pdfs"><i class="fas fa-download"></i> PDFs</a>
                <a href="#tests"><i class="fas fa-tasks"></i> Tests</a>
            </div>
        </div>

        <!-- Content -->
        <div class="col-md-9">

            <div class="alert alert-success">
                <h4>Welcome <span id="welcomeName">Student</span></h4>
                <p>ID: <span id="welcomeId">---</span></p>
            </div>

            <!-- Videos -->
            <div id="videos">
                <h3>Videos</h3>
                <iframe width="100%" height="200"
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
            </div>

        </div>
    </div>
</div>

<script src="js/dashboard.js"></script>

</body>
</html>
