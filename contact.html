<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Our Education Mentor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/contact.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo-section">
        <img src="image/OUR_EDUCATION_MENTOR'S_png.png" alt="logo">
        <span>OUR EDUCATION MENTOR</span>
    </div>

    <div class="menu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="course.htm">Course</a>
        <a href="contact.html">Contact Us</a>
    </div>

    <div class="nav-btns">
        <button class="btn login">Login</button>
        <button class="btn register">Register</button>
    </div>
</nav>

<!-- HERO SECTION (IMPORTANT FIX) -->
<section class="contact-hero">

    <div class="contact-box">
        <h2>📞 Contact Us</h2>

        <form id="contactForm">
            <input type="text" placeholder="Enter your name" required>
            <input type="email" placeholder="Enter your email" required>
            <textarea rows="5" placeholder="Write your message..." required></textarea>

            <button type="submit" class="main-btn">Send Message</button>
        </form>
    </div>

</section>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e){
    e.preventDefault();
    alert('✅ Message sent successfully!');
});
</script>

</body>
</html>
